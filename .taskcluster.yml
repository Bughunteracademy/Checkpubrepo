version: 1
reporting: checks-v1
policy:
  pullRequests: collaborators
  allowComments: collaborators
autoCancelPreviousChecks: true
tasks:
  $let:
    head_rev:
      $if: tasks_for == "github-pull-request"
      then: ${event.pull_request.head.sha}
      else: ${event.after}
    repository:
      $if: tasks_for == "github-pull-request"
      then: ${event.pull_request.head.repo.html_url}
      else: ${event.repository.html_url}
  in:
    $match:
      (tasks_for == "github-pull-request" && event["action"] in ["opened","reopened","synchronize"]) || (tasks_for == "github-issue-comment" && event["action"] in ["created"]):
        taskId:
          $eval: as_slugid("test")
        deadline:
          $fromNow: 1 day
        taskQueueId: docker-compose/generic-worker
        metadata:
          name: plswork
          description: plswork
          owner: ${event.sender.login}@users.noreply.github.com
          source: ${event.repository.url}
        payload:
          maxRunTime: 3600
          image: node
          command: 
            - /bin/bash
            - -c
            - echo "Hello, World!"
